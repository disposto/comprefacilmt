<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato — Compre Fácil MT</title>
  <meta name="description" content="Fale com a Compre Fácil MT por WhatsApp, telefone ou e-mail. Atendimento em todo o Mato Grosso.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="contato">
  <div id="header"></div>

  <div class="page-head">
    <div class="container">
      <div class="breadcrumb"><a href="index.html">Início</a> / Contato</div>
      <h1>Fale com a gente</h1>
      <p>Tem uma dúvida, quer anunciar ou negociar? A nossa equipe responde rapidinho.</p>
    </div>
  </div>

  <section>
    <div class="container">
      <div class="why" style="align-items:start">
        <div class="reveal">
          <div class="form-card" style="max-width:none;margin:0">
            <h2 style="margin-bottom:6px">Envie uma mensagem</h2>
            <p class="muted" style="margin-top:0;margin-bottom:22px">Respondemos em até 1 dia útil.</p>
            <form id="contactForm">
              <div class="form-row">
                <div class="form-field"><label for="cNome">Nome</label><input type="text" id="cNome" placeholder="Seu nome" required></div>
                <div class="form-field"><label for="cTel">WhatsApp</label><input type="tel" id="cTel" placeholder="(66) 90000-0000" required></div>
              </div>
              <div class="form-field"><label for="cEmail">E-mail</label><input type="email" id="cEmail" placeholder="voce@email.com"></div>
              <div class="form-field"><label for="cAssunto">Assunto</label>
                <select id="cAssunto"><option>Quero anunciar</option><option>Dúvida sobre um anúncio</option><option>Sou lojista/corretor</option><option>Outro assunto</option></select>
              </div>
              <div class="form-field"><label for="cMsg">Mensagem</label><textarea id="cMsg" placeholder="Como podemos ajudar?"></textarea></div>
              <button type="submit" class="btn btn-primary btn-block">Enviar mensagem</button>
            </form>
          </div>
        </div>

        <div class="reveal">
          <div class="form-card" style="max-width:none;margin:0 0 22px">
            <h3 style="margin-bottom:16px">Canais de atendimento</h3>
            <div class="contact-line" style="color:var(--ink-700);margin-bottom:16px" id="ct1"></div>
            <div class="contact-line" style="color:var(--ink-700);margin-bottom:16px" id="ct2"></div>
            <div class="contact-line" style="color:var(--ink-700);margin-bottom:16px" id="ct3"></div>
            <div class="contact-line" style="color:var(--ink-700)" id="ct4"></div>
            <a href="https://wa.me/5566996121996?text=Ol%C3%A1!%20Vim%20pelo%20site%20Compre%20F%C3%A1cil%20MT." target="_blank" rel="noopener" class="btn btn-wa btn-block" style="margin-top:22px" id="waBtn">Chamar no WhatsApp</a>
          </div>
          <div class="form-card" style="max-width:none;margin:0;padding:0;overflow:hidden">
            <iframe title="Mapa Rondonópolis - MT" width="100%" height="240" style="border:0;display:block" loading="lazy" referrerpolicy="no-referrer-when-downgrade"
              src="https://www.google.com/maps?q=Rondon%C3%B3polis,MT&output=embed"></iframe>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="footer"></div>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded',()=>{
      document.getElementById('ct1').innerHTML = ICONS.wa + ' <span><b>WhatsApp</b><br>'+CONTATO.whatsappLabel+'</span>';
      document.getElementById('ct2').innerHTML = ICONS.phone + ' <span><b>Telefone</b><br>'+CONTATO.whatsappLabel2+'</span>';
      document.getElementById('ct3').innerHTML = ICONS.mail + ' <span><b>E-mail</b><br>'+CONTATO.email+'</span>';
      document.getElementById('ct4').innerHTML = ICONS.pin + ' <span><b>Região</b><br>Rondonópolis — MT (atende todo o estado)</span>';
      document.getElementById('waBtn').innerHTML = ICONS.wa + ' Chamar no WhatsApp';
      document.getElementById('contactForm').addEventListener('submit',(e)=>{e.preventDefault();showToast('Mensagem enviada! Em breve retornamos.');e.target.reset();});
    });
  </script>
</body>
</html>
