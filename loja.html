<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loja Virtual — Compre Fácil MT</title>
  <meta name="description" content="Eletrônicos, ferramentas, itens para casa e muito mais. As melhores ofertas de Mato Grosso.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="loja">
  <div id="header"></div>

  <div class="page-head">
    <div class="container">
      <div class="breadcrumb"><a href="index.html">Início</a> / Loja Virtual</div>
      <h1>Loja Virtual</h1>
      <p>Eletrônicos, ferramentas, itens para casa, esporte e muito mais — com entrega em todo o estado.</p>
    </div>
  </div>

  <div class="container">
    <div class="listing-layout">
      <aside class="filters">
        <h3>Filtros <span class="clear" id="clearFilters">Limpar</span></h3>
        <div class="filter-group">
          <label for="q">Buscar</label>
          <input type="text" id="q" data-filter placeholder="Produto, loja, cidade...">
        </div>
        <div class="filter-group">
          <label>Faixa de preço (R$)</label>
          <div class="range-row">
            <input type="number" id="fMin" data-filter placeholder="Mín">
            <input type="number" id="fMax" data-filter placeholder="Máx">
          </div>
        </div>
      </aside>

      <div>
        <div class="chips" id="groupChips">
          <button class="chip active" data-type="todos">Todos</button>
          <button class="chip" data-type="Eletrônicos">Eletrônicos</button>
          <button class="chip" data-type="Instrumentos">Instrumentos</button>
          <button class="chip" data-type="Ferramentas">Ferramentas</button>
          <button class="chip" data-type="Casa">Casa</button>
          <button class="chip" data-type="Esporte">Esporte</button>
        </div>
        <div class="results-top">
          <span class="count" id="result-count"></span>
          <div class="sort">
            <label for="fSort" style="font-size:14px;color:var(--ink-500)">Ordenar:</label>
            <select id="fSort" data-filter>
              <option value="">Relevância</option>
              <option value="menor">Menor preço</option>
              <option value="maior">Maior preço</option>
            </select>
          </div>
        </div>
        <div class="grid grid-4" id="listing-grid"></div>
      </div>
    </div>
  </div>

  <div id="footer"></div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
